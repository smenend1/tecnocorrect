<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoCorrect v1.9</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>TecnoCorrect v1.9</h1>
            <p>Corrector Multipàgina</p>
        </header>

        <section class="card">
            <label style="color: #007bff; font-weight: bold;">0. Referències del Professor</label>
            <label>Examen Original:</label>
            <input type="file" id="masterBlank" multiple accept="image/*">
            <label>Solucionari:</label>
            <input type="file" id="masterSolution" multiple accept="image/*">
            <button id="btnClearMemory" style="background:#ff4d4d; color:white; margin-top:10px; border:none; padding:8px; border-radius:4px; width:100%; cursor:pointer;">🗑️ Esborrar memòria de l'examen</button>
        </section>

        <section class="card">
            <label>1. Alumnes (CSV)</label>
            <input type="file" id="csvFile" accept=".csv">
            <label>2. Alumne</label>
            <select id="alumneSelect"><option>Carrega el CSV...</option></select>
        </section>

        <section class="card">
            <label>3. Fotos Alumne</label>
            <input type="file" id="examPhotos" multiple accept="image/*">
            <div id="preview" style="display:flex; flex-wrap:wrap;"></div>
            <button id="btnCorrect" class="btn-main">Corregir amb IA</button>
        </section>

        <section class="card" style="background: #1e1e1e; color: #32ff32; font-family: monospace; font-size: 0.8em;">
            <div id="debugLog" style="height: 100px; overflow-y: auto; padding: 5px;">Sistema a punt...</div>
        </section>

        <section class="card">
            <button id="btnExport" class="btn-sec">Exportar Excel</button>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>

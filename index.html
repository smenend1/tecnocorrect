<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoCorrect v1.3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>TecnoCorrect v1.3</h1>
            <p>Corrector de Tecnologia ESO</p>
        </header>

        <section class="card">
            <label style="color: #007bff; font-weight: bold;">0. Referències del Professor</label>
            
            <label>Examen Original (Enunciats):</label>
            <input type="file" id="masterBlank" accept="image/*,.pdf">
            
            <label>Solucionari (Respostes):</label>
            <input type="file" id="masterSolution" accept="image/*,.pdf">

            <label>Instruccions extra (Opcional):</label>
            <input type="text" id="customInstructions" placeholder="Ex: Penalitza molt les faltes d'ortografia.">
        </section>

        <section class="card">
            <label>1. Llista d'Alumnes (CSV)</label>
            <input type="file" id="csvFile" accept=".csv">
            
            <label>2. Selecciona l'Alumne</label>
            <select id="alumneSelect"><option>Puja primer el CSV...</option></select>
        </section>

        <section class="card">
            <label>3. Examen de l'alumne</label>
            <p style="font-size: 0.75em; color: #666; margin-bottom: 10px;">Pots fer la foto ara o triar-la de la galeria.</p>
            <input type="file" id="examPhotos" multiple accept="image/*">
            
            <div id="preview"></div>
            <button id="btnCorrect" class="btn-main">Corregir amb IA</button>
        </section>

        <section class="card">
            <button id="btnExport" class="btn-sec">Exportar Excel Master</button>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
